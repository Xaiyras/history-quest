<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты | История IT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container results-container">
        <h1>🏆 Результаты 🏆</h1>
        
        <div class="final-score-card">
            <h2>Ваш итоговый счёт:</h2>
            <div class="final-score" id="finalScore">0</div>
        </div>

        <div class="leaderboard">
            <h3>📊 Таблица лидеров</h3>
            <table id="leaderboardTable">
                <thead>
                    <tr><th>Место</th><th>Имя</th><th>Баллы</th><th>Дата</th></tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="4">Пока нет результатов</td></tr>
                </tbody>
            </table>
        </div>

        <div class="buttons">
            <button id="playAgainBtn" class="btn primary">🔄 Пройти заново</button>
            <button id="mainMenuBtn" class="btn secondary">🏠 Главное меню</button>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // Отображение таблицы лидеров
        function displayLeaderboard() {
            const leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || [];
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            
            if (leaderboard.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Пока нет результатов</td></tr>';
                return;
            }
            
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard.slice(0, 10).forEach((entry, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = index + 1;
                row.insertCell(1).textContent = entry.name;
                row.insertCell(2).textContent = entry.score;
                row.insertCell(3).textContent = entry.date;
            });
        }
        
        // Отображение финального счёта
        const finalScore = localStorage.getItem('lastScore');
        if (finalScore) {
            document.getElementById('finalScore').textContent = finalScore;
        }
        
        displayLeaderboard();
        
        document.getElementById('playAgainBtn').onclick = () => {
            localStorage.removeItem('questProgress');
            window.location.href = 'game.html';
        };
        document.getElementById('mainMenuBtn').onclick = () => {
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
